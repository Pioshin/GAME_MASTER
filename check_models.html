<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modelli Gemini API</title>
    <style>
        body { font-family: monospace; background: #1a1a2e; color: #e2e8f0; padding: 20px; }
        input { padding: 8px; width: 300px; font-family: monospace; border: 1px solid #4a5568; background: #2d3748; color: white; }
        button { padding: 8px 16px; background: #48bb78; color: white; border: none; cursor: pointer; }
        pre { background: #2d3748; padding: 15px; border-radius: 5px; overflow-x: auto; white-space: pre-wrap; margin-top: 20px;}
    </style>
</head>
<body>
    <h2>🔍 Verifica Modelli Gemini Disponibili</h2>
    <p>Inserisci la tua API Key per interrogare direttamente i server di Google e vedere quali modelli sono attivi e disponibili per il tuo account web.</p>
    
    <input type="password" id="apiKey" placeholder="Inserisci Gemini API Key...">
    <button onclick="fetchModels()">Trova Modelli</button>
    
    <pre id="output">In attesa...</pre>

    <script>
        async function fetchModels() {
            const key = document.getElementById('apiKey').value.trim();
            const output = document.getElementById('output');
            
            if (!key) {
                output.textContent = "⚠️ Inserisci una API Key valida.";
                return;
            }

            output.textContent = "⏳ Connessione a Google API in corso...";

            try {
                // Recuperiamo la lista dei modelli
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error((data.error && data.error.message) ? data.error.message : "Errore Sconosciuto");
                }

                if (data.models && data.models.length > 0) {
                    // Filtriamo per i modelli che supportano la generazione di testo ("generateContent")
                    const validModels = data.models.filter(m => 
                        m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent")
                    );

                    let text = `✅ Trovati ${validModels.length} modelli utilizzabili per generare testo:\n\n`;
                    validModels.forEach(m => {
                        text += `==========================================================\n`;
                        text += `🚀 ID MODELLO : ${m.name.replace('models/', '')}\n`;
                        text += `📦 Nome       : ${m.displayName}\n`;
                        text += `ℹ️ Descrizione: ${m.description}\n`;
                    });
                    
                    text += `==========================================================\n\n`;
                    text += `👉 Cerca un modello chiamato 'gemini-1.5-flash', 'gemini-1.5-pro' o simili e useremo il suo ID esatto!`;
                    
                    output.textContent = text;
                } else {
                    output.textContent = "Nessun modello trovato per questo account.";
                }

            } catch (error) {
                console.error("Fetch Error:", error);
                output.textContent = `❌ ATTENZIONE ERRORE API:\n${error.message}\n\nAssicurati che la chiave sia corretta e attiva.`;
            }
        }
    </script>
</body>
</html>
